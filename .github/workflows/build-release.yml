name: Build Release Executables

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build for'
        required: false
        default: 'latest'

permissions:
  contents: write

jobs:
  build-linux-amd64:
    name: Build Linux AMD64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller

      - name: Build executable
        run: |
          uv run pyinstaller xsync.spec
          chmod +x dist/xsync

      - name: Test executable
        run: |
          ./dist/xsync --version
          ./dist/xsync --help

      - name: Create archive
        run: |
          cd dist
          tar -czf xsync-linux-amd64.tar.gz xsync
          sha256sum xsync-linux-amd64.tar.gz > xsync-linux-amd64.tar.gz.sha256

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: |
            dist/xsync-linux-amd64.tar.gz
            dist/xsync-linux-amd64.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xsync-linux-amd64
          path: dist/xsync-linux-amd64.tar.gz

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build in ARM64 container
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --file .github/Dockerfile.arm64 \
            --output type=local,dest=./dist \
            .

      - name: Create archive
        run: |
          cd dist
          tar -czf xsync-linux-arm64.tar.gz xsync
          sha256sum xsync-linux-arm64.tar.gz > xsync-linux-arm64.tar.gz.sha256

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: |
            dist/xsync-linux-arm64.tar.gz
            dist/xsync-linux-arm64.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xsync-linux-arm64
          path: dist/xsync-linux-arm64.tar.gz
